name: Release macOS

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    name: Build signed and notarized macOS app
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Import Developer ID certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}

      - name: Write App Store Connect API key
        shell: bash
        run: |
          set -euo pipefail
          test -n "${{ secrets.APPLE_API_KEY_BASE64 }}"
          test -n "${{ secrets.APPLE_API_KEY_ID }}"
          mkdir -p "$RUNNER_TEMP/appstoreconnect"
          echo "${{ secrets.APPLE_API_KEY_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/appstoreconnect/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"
          chmod 600 "$RUNNER_TEMP/appstoreconnect/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"

      - name: Build and notarize
        env:
          APPLE_API_KEY: ${{ runner.temp }}/appstoreconnect/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:notarized

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: forge-macos-release
          path: |
            release/Forge-*.dmg
            release/Forge-*.dmg.blockmap
            release/latest-mac.yml
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/Forge-*.dmg
            release/Forge-*.dmg.blockmap
            release/latest-mac.yml
